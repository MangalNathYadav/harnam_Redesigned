<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="xmas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a472a"/>
      <stop offset="50%" style="stop-color:#2d5a27"/>
      <stop offset="100%" style="stop-color:#8b0000"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#xmas)"/>
  <!-- Snowflakes -->
  <text x="50" y="40" font-size="24" fill="#fff" opacity="0.3">❄</text>
  <text x="150" y="170" font-size="18" fill="#fff" opacity="0.2">❄</text>
  <text x="300" y="30" font-size="20" fill="#fff" opacity="0.25">❄</text>
  <text x="500" y="180" font-size="22" fill="#fff" opacity="0.2">❄</text>
  <text x="650" y="50" font-size="26" fill="#fff" opacity="0.3">❄</text>
  <text x="750" y="150" font-size="16" fill="#fff" opacity="0.2">❄</text>
  <text x="400" y="30" font-size="30" fill="#fff" opacity="0.25">❄</text>
  <!-- Stars -->
  <text x="100" y="100" font-size="16" fill="#ffd700" opacity="0.4">★</text>
  <text x="700" y="80" font-size="20" fill="#ffd700" opacity="0.35">★</text>
  <text x="250" y="60" font-size="14" fill="#ffd700" opacity="0.3">★</text>
  <text x="550" y="45" font-size="18" fill="#ffd700" opacity="0.35">★</text>
  <text x="400" y="80" dominant-baseline="middle" text-anchor="middle" font-family="Georgia, serif" font-size="56" fill="#ffffff" font-weight="bold" letter-spacing="4">Merry Christmas</text>
  <text x="400" y="130" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffd700" opacity="0.9" letter-spacing="6" font-weight="bold">FESTIVE FLAVORS BY HARNAM FOODS</text>
</svg>
