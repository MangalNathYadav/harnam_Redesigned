  <text x="400" y="85" dominant-baseline="middle" text-anchor="middle" font-family="Georgia, serif" font-size="54" fill="#ffffff" font-weight="bold" letter-spacing="4">Winter Specials</text>
  <text x="400" y="135" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#a8d8ff" letter-spacing="6" font-weight="bold">COZY FLAVORS BY HARNAM FOODS</text>
