  <text x="100" y="160" font-size="16" fill="#fff" opacity="0.15">❄</text>
  <text x="200" y="30" font-size="20" fill="#fff" opacity="0.2">❄</text>
  <text x="320" y="180" font-size="22" fill="#fff" opacity="0.18">❄</text>
  <text x="480" y="25" font-size="18" fill="#fff" opacity="0.22">❄</text>
  <text x="580" y="170" font-size="24" fill="#fff" opacity="0.2">❄</text>
  <text x="700" y="40" font-size="20" fill="#fff" opacity="0.18">❄</text>
