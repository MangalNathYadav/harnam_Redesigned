<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f37335"/>
      <stop offset="50%" style="stop-color:#fdc830"/>
      <stop offset="100%" style="stop-color:#f37335"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="url(#gc)"/>
  <circle cx="400" cy="100" r="140" fill="url(#glow)"/>
  <!-- Decorative circles -->
  <circle cx="60" cy="30" r="15" fill="#fff" opacity="0.15"/>
  <circle cx="740" cy="170" r="20" fill="#fff" opacity="0.12"/>
  <circle cx="120" cy="160" r="10" fill="#fff" opacity="0.1"/>
  <circle cx="680" cy="40" r="12" fill="#fff" opacity="0.1"/>
  <!-- Om symbol stylized -->
  <text x="130" y="120" font-family="serif" font-size="80" fill="#fff" opacity="0.15" font-weight="bold">ॐ</text>
  <text x="620" y="130" font-family="serif" font-size="70" fill="#fff" opacity="0.12" font-weight="bold">ॐ</text>
  <text x="400" y="90" dominant-baseline="middle" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#ffffff" font-weight="bold" letter-spacing="3">Ganesh Chaturthi</text>
  <text x="400" y="135" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" opacity="0.8" letter-spacing="6" font-weight="bold">CELEBRATE WITH HARNAM FOODS</text>
</svg>
