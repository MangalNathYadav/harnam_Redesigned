<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="rain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#373B44"/>
      <stop offset="100%" style="stop-color:#4286f4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#rain)"/>
  <!-- Rain drops -->
  <line x1="80" y1="0" x2="70" y2="40" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <line x1="160" y1="10" x2="150" y2="60" stroke="#fff" stroke-width="1.5" opacity="0.15"/>
  <line x1="250" y1="0" x2="240" y2="50" stroke="#fff" stroke-width="1" opacity="0.2"/>
  <line x1="350" y1="5" x2="340" y2="55" stroke="#fff" stroke-width="1.5" opacity="0.18"/>
  <line x1="450" y1="0" x2="440" y2="45" stroke="#fff" stroke-width="1" opacity="0.15"/>
  <line x1="550" y1="10" x2="540" y2="60" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <line x1="650" y1="0" x2="640" y2="50" stroke="#fff" stroke-width="1" opacity="0.17"/>
  <line x1="720" y1="5" x2="710" y2="55" stroke="#fff" stroke-width="1.5" opacity="0.15"/>
  <line x1="120" y1="80" x2="110" y2="130" stroke="#fff" stroke-width="1" opacity="0.12"/>
  <line x1="300" y1="90" x2="290" y2="140" stroke="#fff" stroke-width="1.5" opacity="0.15"/>
  <line x1="500" y1="85" x2="490" y2="135" stroke="#fff" stroke-width="1" opacity="0.12"/>
  <line x1="680" y1="80" x2="670" y2="130" stroke="#fff" stroke-width="1.5" opacity="0.15"/>
  <!-- Cloud shapes -->
  <ellipse cx="150" cy="25" rx="60" ry="20" fill="#fff" opacity="0.08"/>
  <ellipse cx="650" cy="20" rx="70" ry="18" fill="#fff" opacity="0.06"/>
  <text x="400" y="90" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" fill="#ffffff" font-weight="bold" letter-spacing="3">Monsoon Season</text>
  <text x="400" y="135" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#a8d8ff" opacity="0.9" letter-spacing="5" font-weight="bold">WARM SPICES FOR RAINY DAYS</text>
</svg>
