<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="rakhi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7c948"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="url(#rakhi)"/>
  <circle cx="400" cy="100" r="150" fill="url(#glow)"/>
  <!-- Decorative thread lines -->
  <path d="M0,100 Q200,60 400,100 Q600,140 800,100" stroke="#fff" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M0,110 Q200,70 400,110 Q600,150 800,110" stroke="#fff" stroke-width="1" fill="none" opacity="0.12"/>
  <!-- Decorative dots -->
  <circle cx="100" cy="40" r="4" fill="#fff" opacity="0.2"/>
  <circle cx="200" cy="160" r="5" fill="#fff" opacity="0.15"/>
  <circle cx="600" cy="35" r="6" fill="#fff" opacity="0.18"/>
  <circle cx="700" cy="155" r="4" fill="#fff" opacity="0.15"/>
  <text x="400" y="85" dominant-baseline="middle" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#ffffff" font-weight="bold" letter-spacing="3">Raksha Bandhan</text>
  <text x="400" y="135" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#fff" opacity="0.85" letter-spacing="6" font-weight="bold">CELEBRATE WITH HARNAM FOODS</text>
</svg>
