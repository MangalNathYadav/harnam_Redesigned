<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="nav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e52d27"/>
      <stop offset="50%" style="stop-color:#b31217"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#nav)"/>
  <!-- Decorative flame shapes -->
  <ellipse cx="100" cy="180" rx="15" ry="30" fill="#ffd700" opacity="0.15" transform="rotate(-10 100 180)"/>
  <ellipse cx="250" cy="190" rx="12" ry="25" fill="#ffd700" opacity="0.1"/>
  <ellipse cx="550" cy="185" rx="14" ry="28" fill="#ffd700" opacity="0.12" transform="rotate(8 550 185)"/>
  <ellipse cx="700" cy="180" rx="13" ry="26" fill="#ffd700" opacity="0.15" transform="rotate(-5 700 180)"/>
  <!-- Trishul symbol -->
  <line x1="80" y1="30" x2="80" y2="80" stroke="#ffd700" stroke-width="2" opacity="0.15"/>
  <line x1="70" y1="40" x2="80" y2="30" stroke="#ffd700" stroke-width="2" opacity="0.15"/>
  <line x1="90" y1="40" x2="80" y2="30" stroke="#ffd700" stroke-width="2" opacity="0.15"/>
  <line x1="720" y1="30" x2="720" y2="80" stroke="#ffd700" stroke-width="2" opacity="0.15"/>
  <line x1="710" y1="40" x2="720" y2="30" stroke="#ffd700" stroke-width="2" opacity="0.15"/>
  <line x1="730" y1="40" x2="720" y2="30" stroke="#ffd700" stroke-width="2" opacity="0.15"/>
  <text x="400" y="85" dominant-baseline="middle" text-anchor="middle" font-family="Georgia, serif" font-size="54" fill="#ffffff" font-weight="bold" letter-spacing="4">Navratri</text>
  <text x="400" y="135" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffd700" opacity="0.9" letter-spacing="6" font-weight="bold">NINE NIGHTS OF DIVINE FLAVORS</text>
</svg>
